<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LY-split-banner</title>
    <link rel="stylesheet" href="/style.css" />
    <base href="http://cdn-netshop.lyrecocontract.no/" />
  </head>
  <body>
    <section class="main_wrapper_body">
      <style>
        .main_wrapper_body {
          max-width: 1440px;
          width: 100%;
          display: flex;
          flex-direction: column;
          row-gap: 48px;
          font-family: "Jost", sans-serif;
          font-size: var(--fo-16);
          margin-left: auto;
          margin-right: auto;
        }

        @media (max-width: 768px) {
          .main_wrapper_body {
            padding: 0 10px;
          }
        }
      </style>

      <!-- LY-split-banner -->
      <section class="ly-split-banner">
        <style>
          .ly-split-banner {
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
          }

          .ly-split-banner__link {
            display: block;
            width: 100%;
            text-decoration: none !important;
            color: inherit;
            overflow: hidden;
            background: var(--no-neutral-0, #ffffff);
            border: 1px solid var(--no-neutral-300, #e1e3ea);
            border-radius: 10px;
          }

          .ly-split-banner__grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 280px;
          }

          .ly-split-banner__content {
            background: var(--no-supporting-cerulean-300, #bfe8ff);
            padding: 56px 48px 56px 68px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 14px;
          }

          .ly-split-banner__title {
            margin: 0;
            font-size: 20px;
            line-height: 1.2;
            font-weight: 700;
            color: var(--no-primary-500, #2d2e87);
          }

          .ly-split-banner__text {
            margin: 0;
            max-width: 46ch;
            font-size: 18px;
            line-height: 1.5;
            color: var(--no-primary-500, #2d2e87);
          }

          .ly-split-banner__cta {
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 46px;
            padding: 0 22px;
            border-radius: 999px;
            background: var(--no-primary-500, #2d2e87);
            color: var(--no-neutral-0, #ffffff);
            border: 1px solid var(--no-primary-500, #2d2e87);
            font-size: 16px;
            font-weight: 600;
            width: max-content;
            transition: 0.25s ease;
          }

          .ly-split-banner__link:hover .ly-split-banner__cta {
            background: var(--no-neutral-0, #ffffff);
            color: var(--no-primary-500, #2d2e87);
          }

          .ly-split-banner__media {
            position: relative;
            background: var(--no-neutral-200, #f0f2f4);
            min-height: 240px;
          }

          .ly-split-banner__img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
          }

          @media (max-width: 768px) {
            .ly-split-banner__grid {
              grid-template-columns: 1fr;
            }

            .ly-split-banner__content {
              padding: 22px 18px 18px 18px;
            }

            .ly-split-banner__media {
              min-height: 220px;
            }
          }
        </style>

        <a
          class="ly-split-banner__link"
          href="#"
          style="text-decoration: none !important"
          aria-label="Split banner"
        >
          <div class="ly-split-banner__grid">
            <div class="ly-split-banner__content">
              <h3 class="ly-split-banner__title">Tittel her</h3>
              <p class="ly-split-banner__text">
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
                Beskrivende tekst som forklarer innholdet i banneret.
              </p>
              <span class="ly-split-banner__cta">Se produktene her</span>
            </div>
            <div class="ly-split-banner__media" aria-hidden="true">
              <img
                class="ly-split-banner__img"
                src="https://placehold.co/700x400"
                alt="Beskrivende bildetekst"
                loading="lazy"
              />
            </div>
          </div>
        </a>
      </section>
    </section>
  </body>
</html>
