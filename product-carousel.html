<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product carousel</title>
    <link rel="stylesheet" href="/style.css" />
    <base href="http://cdn-netshop.lyrecocontract.no/" />
  </head>
  <body>
    <!-- LY-carousel-product -->
    <section class="ly-carousel-product">
      <style>
        .ly-carousel-product {
          position: relative;
          max-width: 1440px;
          width: 100%;
          margin: 0 auto;
        }

        .ly-carousel-product__track {
          display: flex;
          gap: 16px;
          overflow-x: auto;
          overflow-y: hidden;
          scroll-behavior: smooth;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          padding: 4px 2px 8px 2px;
          scroll-snap-type: x mandatory;
          align-items: stretch;
        }

        .ly-carousel-product__track::-webkit-scrollbar {
          display: none;
        }

        .ly-carousel-product__card {
          width: 270px;
          min-height: 320px;
          background-color: var(--no-neutral-0, #fff);
          border: 1px solid var(--no-primary-300, #b3b3e5);
          display: flex;
          flex-direction: column;
          padding: 14px;
          gap: 10px;
          flex-shrink: 0;
          scroll-snap-align: start;
          text-decoration: none !important;
          color: inherit;
          border-radius: 10px;
          transition:
            background-color 0.2s ease,
            border-color 0.2s ease;
        }

        .ly-carousel-product__card:hover {
          background-color: var(--no-supporting-cerulean-300, #bfe8ff);
          border-color: var(--no-primary-300, #b3b3e5);
        }

        .ly-carousel-product__image {
          height: 170px;
          background: var(--no-neutral-100, #f6f7f9);
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          border-radius: 10px;
        }

        .ly-carousel-product__image img {
          max-height: 100%;
          max-width: 100%;
          object-fit: contain;
          mix-blend-mode: multiply;
          display: block;
        }

        .ly-carousel-product__title {
          margin: 4px 0 0 0;
          font-size: 16px;
          line-height: 1.25;
          color: var(--no-primary-500, #2d2e87);
          height: 42px;
          overflow: hidden;
          display: -webkit-box;
          -webkit-line-clamp: 2;
          line-clamp: 2;
          -webkit-box-orient: vertical;
        }

        .ly-carousel-product__sku {
          font-size: 13px;
          color: var(--no-neutral-650, #51616f);
          margin-top: 2px;
        }

        .ly-carousel-product__cta {
          margin-top: auto;
          height: 40px;
          border-radius: 999px;
          border: 1px solid #7fbf00;
          background-color: #7fbf00;
          color: var(--no-neutral-0, #fff);
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 500;
          transition:
            background-color 0.2s ease,
            color 0.2s ease,
            border-color 0.2s ease;
        }

        .ly-carousel-product__card:hover .ly-carousel-product__cta {
          background-color: var(--no-neutral-0, #fff);
          color: var(--no-semantic-success-700, #2a401d);
          border-color: var(--no-semantic-success-700, #2a401d);
        }

        @media (min-width: 1440px) {
          .ly-carousel-product__track {
            overflow-x: hidden;
            scroll-snap-type: none;
          }

          .ly-carousel-product__card {
            width: auto;
            flex: 1 1 0;
            min-width: 0;
          }
        }
      </style>

      <div class="ly-carousel-product__track">
        <!-- PRODUCT 1 -->
        <a href="#" class="ly-carousel-product__card">
          <div class="ly-carousel-product__image">
            <img
              src="https://placehold.co/200x170"

          <div class="ly-carousel-product__sku">Varenr: 000000</div>
          <div class="ly-carousel-product__cta">Se produkt</div>
        </a>

        <!-- PRODUCT 2 -->
        <a href="#" class="ly-carousel-product__card">
          <div class="ly-carousel-product__image">
            <img
              src="https://placehold.co/200x170"
              alt="Produktnavn"
              loading="lazy"
            />
          </div>
          <h3 class="ly-carousel-product__title">Produktnavn her</h3>
          <div class="ly-carousel-product__sku">Varenr: 000000</div>
          <div class="ly-carousel-product__cta">Se produkt</div>
        </a>

        <!-- PRODUCT 3 -->
        <a href="#" class="ly-carousel-product__card">

    <!-- #region carousel script -->
    <script>
      (function () {
        document
          .querySelectorAll(".hb-simple-product-carousel--fade")
          .forEach(function (carousel) {
            var track = carousel.querySelector(
              ".hb-simple-product-carousel__track",
            );
            if (!track) return;

            function updateFades() {
              var maxScroll = track.scrollWidth - track.clientWidth;
              var left = track.scrollLeft;
              var canScroll = maxScroll > 2;

              carousel.classList.toggle("is-left-fade", canScroll && left > 2);
              carousel.classList.toggle(
                "is-right-fade",
                canScroll && left < maxScroll - 2,
              );
            }

            track.addEventListener("scroll", function () {
              window.requestAnimationFrame(updateFades);
            });

            window.addEventListener("resize", updateFades);
            updateFades();
          });
      })();

      (function () {
        document
          .querySelectorAll(".hb-simple-product-carousel")
          .forEach(function (carousel) {
            var track = carousel.querySelector(
              ".hb-simple-product-carousel__track",
            );
            var leftBtn = carousel.querySelector(
              ".hb-simple-product-carousel__nav--left",
            );
            var rightBtn = carousel.querySelector(
              ".hb-simple-product-carousel__nav--right",
            );
            if (!track || !leftBtn || !rightBtn) return;

            function getStep() {
              var card = track.querySelector(".hb-simple-product-card");
              if (!card) return 260;
              var styles = window.getComputedStyle(track);
              var gap = parseFloat(styles.columnGap || styles.gap || "0") || 0;
              return card.getBoundingClientRect().width + gap;
            }

            function updateButtons() {
              var canScroll = track.scrollWidth > track.clientWidth + 2;
              if (!canScroll) {
                leftBtn.style.display = "none";
                rightBtn.style.display = "none";
                return;
              }
              leftBtn.style.display = "flex";
              rightBtn.style.display = "flex";

              var maxScroll = track.scrollWidth - track.clientWidth;
              leftBtn.disabled = track.scrollLeft <= 1;
              rightBtn.disabled = track.scrollLeft >= maxScroll - 1;
            }

            leftBtn.addEventListener("click", function () {
              track.scrollLeft -= getStep();
            });

            rightBtn.addEventListener("click", function () {
              track.scrollLeft += getStep();
            });

            track.addEventListener("scroll", function () {
              window.requestAnimationFrame(updateButtons);
            });

            updateButtons();
            window.addEventListener("resize", updateButtons);
          });
      })();
    </script>
    <!-- endregion -->
  </body>
</html>
