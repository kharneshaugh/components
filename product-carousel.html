    <!-- #region PRODUCT CAROUSEL -->
    <section
      class="hb-simple-product-carousel hb-simple-product-carousel--fade">
      <style>
        .hb-simple-product-carousel {
          position: relative;
          max-width: 1440px;
          width: 100%;
          margin: 0 auto;
          font-family: "Jost", sans-serif;
        }

        .hb-simple-product-carousel a {
          text-decoration: none !important;
          color: inherit;
        }

        .hb-simple-product-carousel__viewport {
          position: relative;
          width: 100%;
        }

        .hb-simple-product-carousel__track {
          display: flex;
          gap: 16px;
          overflow-x: auto;
          overflow-y: hidden;
          scroll-behavior: smooth;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          padding: 4px 2px 8px 2px;
          scroll-snap-type: x mandatory;
          align-items: stretch;
        }

        .hb-simple-product-carousel__track::-webkit-scrollbar {
          display: none;
        }

        .hb-simple-product-carousel--fade
          .hb-simple-product-carousel__viewport::before,
        .hb-simple-product-carousel--fade
          .hb-simple-product-carousel__viewport::after {
          content: "";
          position: absolute;
          top: 0;
          bottom: 0;
          width: 64px;
          pointer-events: none;
          z-index: 3;
          opacity: 0;
          transition: opacity 0.2s ease;
        }

        .hb-simple-product-carousel--fade
          .hb-simple-product-carousel__viewport::before {
          left: 0;
          background: linear-gradient(
            to right,
            var(--no-neutral-0, #fff),
            rgba(255, 255, 255, 0)
          );
        }

        .hb-simple-product-carousel--fade
          .hb-simple-product-carousel__viewport::after {
          right: 0;
          background: linear-gradient(
            to left,
            var(--no-neutral-0, #fff),
            rgba(255, 255, 255, 0)
          );
        }

        .hb-simple-product-carousel--fade.is-left-fade
          .hb-simple-product-carousel__viewport::before {
          opacity: 1;
        }
        .hb-simple-product-carousel--fade.is-right-fade
          .hb-simple-product-carousel__viewport::after {
          opacity: 1;
        }

        .hb-simple-product-card {
          width: 270px;
          min-height: 320px;
          background-color: var(--no-neutral-0, #fff);
          border: 1px solid #b3b3e5;
          display: flex;
          flex-direction: column;
          padding: 14px;
          gap: 10px;
          flex-shrink: 0;
          scroll-snap-align: start;
          transition:
            background-color 0.2s ease,
            border-color 0.2s ease;
        }

        .hb-simple-product-card:hover {
          background-color: var(--no-supporting-cerulean-300, #e6f2ff);
          border-color: var(--no-primary-300, #a9c7ff);
        }

        .hb-simple-product-card__image {
          height: 170px;
          background: var(--no-neutral-100, #f5f5f5);
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
        }

        .hb-simple-product-card__image img {
          max-height: 100%;
          max-width: 100%;
          object-fit: contain;
          mix-blend-mode: multiply;
          display: block;
        }

        .hb-simple-product-card__title {
          margin: 4px 0 0 0;
          font-size: 16px;
          line-height: 1.25;
          color: var(--no-primary-500, #2d2e87);
          height: 42px;
          overflow: hidden;
          display: -webkit-box;
          -webkit-line-clamp: 2;
          line-clamp: 2;
          -webkit-box-orient: vertical;
        }

        .hb-simple-product-card__sku {
          font-size: 13px;
          color: var(--no-neutral-650, #666);
          margin-top: 2px;
        }

        .hb-simple-product-card__cta {
          margin-top: auto;
          height: 40px;
          border-radius: 999px;
          border: 1px solid var(--no-success-600, #7fbf00);
          background-color: var(--no-success-600, #7fbf00);
          color: var(--no-neutral-0, #fff);
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 500;
          transition:
            background-color 0.2s ease,
            color 0.2s ease,
            border-color 0.2s ease;
        }

        .hb-simple-product-card:hover .hb-simple-product-card__cta {
          background-color: var(--no-neutral-0, #fff);
          color: var(--no-success-700, #5f9800);
          border-color: var(--no-success-700, #5f9800);
        }

        @media (min-width: 1440px) {
          .hb-simple-product-carousel__track {
            overflow-x: hidden;
            scroll-snap-type: none;
          }

          .hb-simple-product-card {
            width: auto;
            flex: 1 1 0;
            min-width: 0;
          }
        }
      </style>

    <!-- #region carousel script -->
    <script>
      (function () {
        document
          .querySelectorAll(".hb-simple-product-carousel--fade")
          .forEach(function (carousel) {
            var track = carousel.querySelector(
              ".hb-simple-product-carousel__track",
            );
            if (!track) return;

            function updateFades() {
              var maxScroll = track.scrollWidth - track.clientWidth;
              var left = track.scrollLeft;
              var canScroll = maxScroll > 2;

              carousel.classList.toggle("is-left-fade", canScroll && left > 2);
              carousel.classList.toggle(
                "is-right-fade",
                canScroll && left < maxScroll - 2,
              );
            }

            track.addEventListener("scroll", function () {
              window.requestAnimationFrame(updateFades);
            });

            window.addEventListener("resize", updateFades);
            updateFades();
          });
      })();

      (function () {
        document
          .querySelectorAll(".hb-simple-product-carousel")
          .forEach(function (carousel) {
            var track = carousel.querySelector(
              ".hb-simple-product-carousel__track",
            );
            var leftBtn = carousel.querySelector(
              ".hb-simple-product-carousel__nav--left",
            );
            var rightBtn = carousel.querySelector(
              ".hb-simple-product-carousel__nav--right",
            );
            if (!track || !leftBtn || !rightBtn) return;

            function getStep() {
              var card = track.querySelector(".hb-simple-product-card");
              if (!card) return 260;
              var styles = window.getComputedStyle(track);
              var gap = parseFloat(styles.columnGap || styles.gap || "0") || 0;
              return card.getBoundingClientRect().width + gap;
            }

            function updateButtons() {
              var canScroll = track.scrollWidth > track.clientWidth + 2;
              if (!canScroll) {
                leftBtn.style.display = "none";
                rightBtn.style.display = "none";
                return;
              }
              leftBtn.style.display = "flex";
              rightBtn.style.display = "flex";

              var maxScroll = track.scrollWidth - track.clientWidth;
              leftBtn.disabled = track.scrollLeft <= 1;
              rightBtn.disabled = track.scrollLeft >= maxScroll - 1;
            }

            leftBtn.addEventListener("click", function () {
              track.scrollLeft -= getStep();
            });

            rightBtn.addEventListener("click", function () {
              track.scrollLeft += getStep();
            });

            track.addEventListener("scroll", function () {
              window.requestAnimationFrame(updateButtons);
            });

            updateButtons();
            window.addEventListener("resize", updateButtons);
          });
      })();
    </script>
