          <!-- #region FLIP COUNTDOWN CLOCK (FULL COMPONENT) -->
          <div class="hb-medlem-klokke" data-target="2026-02-26T00:00:00+01:00">
            <style>
              .hb-medlem-klokke {
                position: absolute;
                bottom: 2rem;
                left: 4.5rem;
                z-index: 11;
                --digit-h: 72px;
                --half-h: calc(var(--digit-h) / 2);
                --digit-w: 54px;

                --gap-units: 14px;
                --gap-digits: 10px;

                --pad-y: 14px;
                --pad-x: 14px;

                display: inline-flex;
                flex-wrap: nowrap;
                gap: var(--gap-units);
                padding: var(--pad-y) var(--pad-x);
                border-radius: 12px;
                background: transparent;
                align-items: center;
                font-family: inherit;

                max-width: 100%;
                box-sizing: border-box;
              }

              .hb-medlem-klokke__unit {
                display: grid;
                justify-items: center;
                gap: 8px;
                min-width: 96px;
                flex: 0 0 auto;
              }

              .hb-medlem-klokke__label {
                font-size: 12px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #69eecf;
                line-height: 1;
              }

              .hb-medlem-klokke__digits {
                display: inline-flex;
                gap: var(--gap-digits);
              }

              .hb-medlem-klokke__digit {
                position: relative;
                width: var(--digit-w);
                height: var(--digit-h);
                border-radius: 10px;
                perspective: 900px;
                overflow: hidden;
                color: #1b2a7a;
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
                font-variant-numeric: tabular-nums;

                background: linear-gradient(180deg, #f7f8ff, #dfe7ff);
              }

              .hb-medlem-klokke__digit::after {
                content: "";
                position: absolute;
                left: 0;
                right: 0;
                top: 50%;
                height: 2px;
                background: rgba(0, 0, 0, 0.25);
                transform: translateY(-1px);
                z-index: 10;
                box-shadow: 0 1px 0 rgba(255, 255, 255, 0.55);
              }

              .hb-medlem-klokke__half {
                position: absolute;
                left: 0;
                right: 0;
                height: 50%;
                overflow: hidden;
                z-index: 1;
              }

              .hb-medlem-klokke__half--top {
                top: 0;
                border-bottom: 1px solid rgba(0, 0, 0, 0.08);
              }

              .hb-medlem-klokke__half--bottom {
                bottom: 0;
              }

              .hb-medlem-klokke__flap {
                position: absolute;
                left: 0;
                right: 0;
                height: 50%;
                overflow: hidden;
                backface-visibility: hidden;
                z-index: 5;
              }

              .hb-medlem-klokke__flap--top {
                top: 0;
                transform-origin: bottom;
                border-bottom: 1px solid rgba(0, 0, 0, 0.08);
                transform: rotateX(0deg);
              }

              .hb-medlem-klokke__flap--bottom {
                bottom: 0;
                transform-origin: top;
                transform: rotateX(90deg);
              }

              .hb-medlem-klokke__glyph {
                position: absolute;
                left: 0;
                right: 0;
                height: var(--digit-h);
                display: grid;
                place-items: center;

                font-weight: 800;
                font-size: 44px;
                line-height: 1;
                letter-spacing: 0;
                color: #1b2a7a;

                background: linear-gradient(180deg, #f7f8ff, #dfe7ff);
              }

              .hb-medlem-klokke__half--top .hb-medlem-klokke__glyph,
              .hb-medlem-klokke__flap--top .hb-medlem-klokke__glyph {
                top: 0;
              }

              .hb-medlem-klokke__half--bottom .hb-medlem-klokke__glyph,
              .hb-medlem-klokke__flap--bottom .hb-medlem-klokke__glyph {
                top: calc(-1 * var(--half-h));
              }

              /* Animations */
              .hb-medlem-klokke__digit.is-flipping
                .hb-medlem-klokke__flap--top {
                animation: hbFlipTop 220ms ease-in forwards;
              }

              .hb-medlem-klokke__digit.is-flipping
                .hb-medlem-klokke__flap--bottom {
                animation: hbFlipBottom 240ms ease-out forwards;
                animation-delay: 180ms;
              }

              @keyframes hbFlipTop {
                from {
                  transform: rotateX(0deg);
                }
                to {
                  transform: rotateX(-90deg);
                }
              }

              @keyframes hbFlipBottom {
                from {
                  transform: rotateX(90deg);
                }
                to {
                  transform: rotateX(0deg);
                }
              }

              @media (max-width: 1024px) {
                .hb-medlem-klokke {

            <script>
              (function () {
                const root = document.querySelector(".hb-medlem-klokke");
                if (!root) return;

                const targetAttr = root.getAttribute("data-target");
                const targetDate = targetAttr ? new Date(targetAttr) : null;
                if (!targetDate || isNaN(targetDate.getTime())) return;

                const prev = {
                  days: "00",
                  hours: "00",
                  minutes: "00",
                  seconds: "00",
                };
                const pad2 = (n) => String(n).padStart(2, "0");

                function getParts() {
                  const now = new Date();
                  let diff = targetDate.getTime() - now.getTime();
                  if (diff < 0) diff = 0;

                  const totalSeconds = Math.floor(diff / 1000);
                  const days = Math.floor(totalSeconds / 86400);
                  const hours = Math.floor((totalSeconds % 86400) / 3600);
                  const minutes = Math.floor((totalSeconds % 3600) / 60);
                  const seconds = totalSeconds % 60;

                  return {
                    days: pad2(days % 100),
                    hours: pad2(hours),
                    minutes: pad2(minutes),
                    seconds: pad2(seconds),
                  };
                }

                function setGlyph(el, val) {
                  const g = el.querySelector(".hb-medlem-klokke__glyph");
                  if (g) g.textContent = val;
                }

                function flipDigit(digitEl, newChar, oldChar) {
                  const topHalf = digitEl.querySelector(
                    ".hb-medlem-klokke__half--top",
                  );
                  const botHalf = digitEl.querySelector(
                    ".hb-medlem-klokke__half--bottom",
                  );
                  const flapTop = digitEl.querySelector(
                    ".hb-medlem-klokke__flap--top",
                  );
                  const flapBot = digitEl.querySelector(
                    ".hb-medlem-klokke__flap--bottom",
                  );

                  if (digitEl._t1) clearTimeout(digitEl._t1);
                  if (digitEl._t2) clearTimeout(digitEl._t2);

                  if (newChar === oldChar) {
                    setGlyph(topHalf, newChar);
                    setGlyph(botHalf, newChar);
                    setGlyph(flapTop, newChar);
                    setGlyph(flapBot, newChar);
                    digitEl.classList.remove("is-flipping");
                    return;
                  }

                  setGlyph(topHalf, oldChar);
                  setGlyph(botHalf, newChar);

                  setGlyph(flapTop, oldChar);
                  setGlyph(flapBot, newChar);

                  digitEl.classList.remove("is-flipping");
                  void digitEl.offsetWidth;
                  digitEl.classList.add("is-flipping");
                  digitEl._t1 = setTimeout(() => {
                    setGlyph(topHalf, newChar);
                  }, 200);

                  digitEl._t2 = setTimeout(() => {
                    setGlyph(topHalf, newChar);
                    setGlyph(botHalf, newChar);
                    digitEl.classList.remove("is-flipping");
                  }, 10000);
                }

                function render(next) {
                  ["days", "hours", "minutes", "seconds"].forEach((unit) => {
                    const unitEl = root.querySelector(`[data-unit="${unit}"]`);
                    if (!unitEl) return;

                    const digits = unitEl.querySelectorAll(
                      ".hb-medlem-klokke__digit",
                    );
                    const oldStr = prev[unit];
                    const newStr = next[unit];

                    flipDigit(digits[0], newStr[0], oldStr[0]);
                    flipDigit(digits[1], newStr[1], oldStr[1]);

                    prev[unit] = newStr;
                  });
                }

                const first = getParts();
                prev.days = first.days;
                prev.hours = first.hours;
                prev.minutes = first.minutes;
                prev.seconds = first.seconds;
                render(first);

                setInterval(() => {
                  render(getParts());
                }, 1000);
              })();
            </script>
