    <section class="main_wrapper_body">
      <style>
        .main_wrapper_body {
          max-width: 1440px;
          width: 100%;
          display: flex;
          flex-direction: column;
          row-gap: 48px;
          font-family: "Jost", sans-serif;
          font-size: var(--fo-16);
          margin-left: auto;
          margin-right: auto;
        }

        @media (max-width: 768px) {
          .main_wrapper_body {
            padding: 0 10px;
          }
        }
      </style>

      <!-- #region Hero LYRECO.NO-->
      <div class="ly-carousel-wrapper">
        <style>
          html {
            -webkit-text-size-adjust: 100%;
          }

          .ly-banner-carousel-color {
            display: flex !important;
            justify-content: center;
            width: 100%;
            height: 400px;
            color: var(--no-primary-500);
          }

          .ly-carousel-wrapper {
            position: relative;
            width: 100%;
            max-width: 1440px;
            max-height: 500px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
          }

          .ly-carousel-track {
            display: flex !important;
            transition: transform 0.5s ease-in-out;
            width: 100%;
            height: 100%;
          }

          .ly-slide {
            position: relative;
            flex: 0 0 100%;
            max-height: 500px;
            box-sizing: border-box;
            background: url("/static/objectstore/NO-lyreco-front-hero-background-1261x400.webp")
              center/cover no-repeat;
            color: var(--no-neutral-0);
            overflow: hidden;
            text-decoration: none !important;
          }

          .ly-slide-content {
            display: flex !important;
            flex-direction: column;
            padding: 2rem 4rem;
            gap: 1rem;
            text-decoration: none;
            margin-bottom: 4rem;
            max-width: 700px;
          }

          .ly-slide-content h1,
          .ly-slide-content h2 {
            font-family: "Grauna", sans-serif;
            line-height: 0.85;
            font-weight: 400;
          }

          .ly-slide-content h1 {
            font-size: 5.5rem;
            margin: 0 0 1rem 0 !important;
          }

          .ly-slide-content h2 {
            font-size: 4rem;
            margin: 0 !important;
          }

          .ly-slide-content p {
            margin: 0 !important;
            font-size: 2rem;
            font-weight: 300;
            max-width: 700px;
          }

          .ly-slide-image {
            position: absolute;
            display: flex !important;
            justify-content: flex-end;
            height: 100%;
            width: 100%;
          }

          .ly-slide-image img {
            position: absolute;
            object-fit: contain;
            height: 100%;
            right: 67px;
            bottom: -1.5rem;
          }

          .no-hero-pill-cta {
            position: absolute !important;
            left: 4rem;
            bottom: 2rem;
            border: 1px solid var(--no-neutral-0);
            background: var(--no-neutral-0);
            color: var(--no-primary-500);
            transition:
              background-color 0.3s ease,
              color 0.3s ease;
            padding: 0.75rem 2rem;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.2rem;
            max-width: 20rem;
            font-family: "Jost";
          }

          .no-hero-pill-cta:hover {
            background: transparent;
            color: var(--no-neutral-0);
          }

          .ly-carousel-nav {
            position: absolute !important;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex !important;
            gap: 0.5rem;
            z-index: 10;
          }

          .ly-carousel-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #0000007e;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background-color 0.3s ease;
          }

          .ly-carousel-dot.active {
            background: var(--no-neutral-0);
          }

          .ly-slide,
          .ly-slide:visited,
          .ly-slide:hover,
          .ly-slide:active {
            color: var(--no-neutral-0) !important;
            text-decoration: none !important;
          }

          .hb-domain-gated[hidden] {
            display: none !important;
          }

          .ly-slide-sales-badge {
            position: absolute;
            top: 1rem;
            right: 0;
            background-color: var(--no-badges-promotions) !important;
            color: var(--no-neutral-0);
            padding: 0.5rem 1rem;
            border-radius: 6px 0 0 6px;
            font-weight: 600;
            font-size: 2rem;
            z-index: 5;
          }

          .khh-carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 16px 12px 16px;
            border-radius: 6px;
            border: none;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 20;
            transition:
              background 0.3s ease,
              transform 0.2s ease;
          }

          .khh-carousel-arrow:hover {
            background: rgba(0, 0, 0, 0.6);
            transform: translateY(-50%) scale(1.05);
          }

          .khh-carousel-arrow--prev {
            left: 16px;
          }

          .khh-carousel-arrow--next {
            right: 16px;
          }

          /* Skjul på mobil hvis ønskelig */
          @media (max-width: 768px) {
            .khh-carousel-arrow {
              display: none;
            }
          }

          @media (max-width: 1160px) {
            .ly-slide-content h1 {
              font-size: 5.5rem;
            }
          }

          @media (max-width: 950px) {
            .ly-slide-content h1 {
              font-size: 5rem;
            }
            .ly-slide-content p {
              font-size: 1.5rem;
            }

          @media (max-width: 768px) {
            .ly-slide {
              display: flex !important;
              flex-direction: column;
              max-height: 500px;
            }

            .ly-slide-content {
              padding: 1.5rem !important;
              z-index: 10;
            }

            /* .ly-slide-image img {
              display: none;
            } */

            .ly-slide-content h2 {
              font-size: 2.7rem;
            }

            .ly-slide-content p {
              display: none;
            }

            .no-hero-pill-cta {
              left: 1.5rem;
              bottom: 1.5rem;
              max-width: none;
              right: auto;
              font-size: 1.25rem;
            }

            .ly-slide-sales-badge {
              font-size: 1.5rem;
            }
          }

          @media (max-width: 585px) {
            .ly-slide-content {
              padding: 5rem 1.5rem 2rem 1.5rem !important;
            }
            .ly-slide-content h1,
            .ly-slide-content h2 {
              font-size: 4rem;
            }
          }

          @media (max-width: 400px) {
            .ly-slide-content h1 {
              font-size: 3rem;
            }
            .ly-slide-content p {
              font-size: 1rem;
            }

            .ly-slide-sales-badge {
              font-size: 1rem;
            }
          }
        </style>

        <div class="ly-carousel-nav" id="ly-carousel-nav"></div>
        <script>
          (function () {
            const track = document.getElementById("ly-carousel-track");
            const nav = document.getElementById("ly-carousel-nav");
            const slides = track.querySelectorAll(".ly-slide");
            let current = 0;
            let timer;
            const prevBtn = document.querySelector(".khh-carousel-arrow--prev");
            const nextBtn = document.querySelector(".khh-carousel-arrow--next");

            if (slides.length <= 1) {
              nav.style.display = "none";
              return;
            }

            slides.forEach((_, i) => {
              const dot = document.createElement("div");
              dot.className = "ly-carousel-dot" + (i === 0 ? " active" : "");
              dot.addEventListener("click", () => goTo(i));
              nav.appendChild(dot);
            });

            function goTo(i) {
              current = i;
              track.style.transform = `translateX(-${i * 100}%)`;
              updateDots();
              restart();
            }

            function updateDots() {
              nav
                .querySelectorAll(".ly-carousel-dot")
                .forEach((dot, i) =>
                  dot.classList.toggle("active", i === current),
                );
            }

            function next() {
              current = (current + 1) % slides.length;
              goTo(current);
            }

            function start() {
              timer = setInterval(next, 6000);
            }

            function restart() {
              clearInterval(timer);
              start();
            }

            prevBtn.addEventListener("click", () => {
              current = (current - 1 + slides.length) % slides.length;
              goTo(current);
            });

            nextBtn.addEventListener("click", () => {
              current = (current + 1) % slides.length;
              goTo(current);
            });

            start();
          })();
        </script>
