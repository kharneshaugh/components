<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highlights</title>
    <link rel="stylesheet" href="/style.css" />
    <base href="http://cdn-netshop.lyrecocontract.no/" />
  </head>
  <body>
    <section class="main_wrapper_body">
      <style>
        .main_wrapper_body {
          max-width: 1440px;
          width: 100%;
          display: flex;
          flex-direction: column;
          row-gap: 48px;
          font-family: "Jost", sans-serif;
          font-size: var(--fo-16);
          margin-left: auto;
          margin-right: auto;
        }

        @media (max-width: 768px) {
          .main_wrapper_body {
            padding: 0 10px;
          }
        }
      </style>

      <!-- LY-highlights-text -->
      <section class="ly-highlights-text">
        <style>
          .ly-highlights-text {
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            padding: 4px 0;
            scrollbar-width: none;
          }

          .ly-highlights-text::-webkit-scrollbar {
            display: none;
          }

          .ly-highlights-text__card {
            flex: 0 0 360px;
            height: 220px;
            border-radius: 10px;
            text-decoration: none !important;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            scroll-snap-align: start;
            transition: transform 0.3s ease;
          }

          .ly-highlights-text__card:hover {
            transform: translateY(-10px);
          }

          /* Color variants */
          .ly-highlights-text__card--red {
            background-color: var(--no-semantic-error-400, #fdd9d9);
          }

          .ly-highlights-text__card--yellow {
            background-color: var(--no-semantic-warning-400, #ffefc8);
          }

          .ly-highlights-text__card--primary {
            background-color: var(--no-primary-200, #e0e1f5);
          }

          .ly-highlights-text__card--mint {
            background-color: var(--no-supporting-mint-300, #dbedde);
          }

          .ly-highlights-text__card--cerulean {
            background-color: var(--no-supporting-cerulean-300, #bfe8ff);
          }

          .ly-highlights-text__title {
            margin: 0;
            padding: 3rem;
            font-size: 2.5rem;
            line-height: 1.3;
            font-weight: 400;
            color: var(--no-badges-promotions, #d8345f);
          }

          .ly-highlights-text__title strong {
            font-weight: 800;
          }

          @media (max-width: 768px) {
            .ly-highlights-text__card {
              flex-basis: 300px;
            }

            .ly-highlights-text__title {
              padding: 2rem;
              font-size: 2rem;
              line-height: 1.3;
            }
          }

          @media (hover: none) {
            .ly-highlights-text__card:hover {
              transform: none;
            }
          }
        </style>

        <!-- CARD 1 -->
        <a
          href="#"
          class="ly-highlights-text__card ly-highlights-text__card--red"
        >
          <h2 class="ly-highlights-text__title">
            Første<br />linje<br /><strong>fremhevet</strong>
          </h2>
        </a>

        <!-- CARD 2 -->
        <a
          href="#"
          class="ly-highlights-text__card ly-highlights-text__card--yellow"
        >
          <h2 class="ly-highlights-text__title">
            <strong>Ord,</strong><br /><strong>flere ord</strong><br />og mer
          </h2>
        </a>

        <!-- CARD 3 -->
        <a
          href="#"
          class="ly-highlights-text__card ly-highlights-text__card--primary"
        >
          <h2 class="ly-highlights-text__title">
            Tittel<br />med<br /><strong>vekt</strong>
          </h2>
        </a>
      </section>
    </section>
  </body>
</html>
