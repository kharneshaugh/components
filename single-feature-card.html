<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Single Feature Card</title>
    <link rel="stylesheet" href="/style.css" />
    <base href="http://cdn-netshop.lyrecocontract.no/" />
  </head>
  <body>
    <section class="main_wrapper_body">
      <style>
        .main_wrapper_body {
          max-width: 1440px;
          width: 100%;
          display: flex;
          flex-direction: column;
          row-gap: 48px;
          font-family: "Jost", sans-serif;
          font-size: var(--fo-16);
          margin-left: auto;
          margin-right: auto;
        }

        @media (max-width: 768px) {
          .main_wrapper_body {
            padding: 0 10px;
          }
        }
      </style>

      <!-- LY-feature-single -->
      <section class="ly-feature-single">
        <style>
          .ly-feature-single {
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
          }

          .ly-feature-single__link {
            display: block;
            text-decoration: none !important;
            color: inherit;
          }

          .ly-feature-single__card {
            display: flex;
            justify-content: space-evenly;
            align-items: stretch;
            overflow: hidden;
            border-radius: 10px;
            background-color: var(--no-neutral-0, #ffffff);
            color: var(--no-primary-500, #2d2e87);
          }

          .reverse-row {
            flex-direction: row-reverse;
          }

          .ly-feature-single__image {
            flex: 1;
            overflow: hidden;
            aspect-ratio: 4 / 3;
          }

          .ly-feature-single__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
          }

          .ly-feature-single__content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4rem;
          }

          .ly-feature-single__title {
            font-size: 36px;
            font-weight: 700;
            margin: 0;
            padding-right: 4rem;
          }

          .ly-feature-single__text {
            margin: 20px 0;
            font-size: 16px;
            padding-right: 4rem;
            line-height: 1.55;
          }

          .ly-feature-single__cta {
            margin-top: 24px;
          }

          @media (max-width: 768px) {
            .ly-feature-single__card {
              flex-direction: column;
            }

            .ly-feature-single__image {
              height: 260px;
              aspect-ratio: unset;
            }

            .ly-feature-single__content {
              padding: 24px;
            }

            .ly-feature-single__title,
            .ly-feature-single__text {
              padding-right: 0;
            }
          }
        </style>

        <a href="#" class="ly-feature-single__link">
          <div class="ly-feature-single__card">
            <div class="ly-feature-single__image">
              <img
                src="https://placehold.co/700x525"
                alt="Beskrivende bildetekst"
              />
            </div>
            <div class="ly-feature-single__content">
              <h2 class="ly-feature-single__title">
                Overskrift for dette kortet
              </h2>
              <p class="ly-feature-single__text">
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
                Beskrivende tekst som forklarer innholdet.
              </p>
              <div class="ly-feature-single__cta">
                <span class="no-pill-btn no-pill-btn-brand-primary"
                  >Se produktene her</span
                >
              </div>
            </div>
          </div>
        </a>
      </section>
    </section>
  </body>
</html>
