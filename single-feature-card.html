<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Single Feature Card</title>
    <link rel="stylesheet" href="/Components/style.css" />
    <base href="http://cdn-netshop.lyrecocontract.no/" />
  </head>
  <body>
    <section class="main_wrapper_body">
      <style>
        .main_wrapper_body {
          max-width: 1440px;
          width: 100%;
          display: flex;
          flex-direction: column;
          row-gap: 48px;
          font-family: "Jost", sans-serif;
          font-size: var(--fo-16);
          margin-left: auto;
          margin-right: auto;
        }

        @media (max-width: 768px) {
          .main_wrapper_body {
            padding: 0 10px;
          }
        }
      </style>

      <!-- #region SINGLE CARD -->
      <style>
        .ly-feature-card-link {
          display: block;
          max-width: 1440px;
          margin: 0 auto;
          text-decoration: none !important;
          color: inherit;
        }

        .ly-feature-card-link:focus-visible {
          outline: 3px solid rgba(255, 255, 255, 0.9);
          outline-offset: 6px;
          border-radius: 10px;
        }

        .ly-feature-card {
          display: flex;
          justify-content: space-evenly;
          align-items: stretch;
          overflow: hidden;
        }

        .ly-feature-card--blue {
          background-color: var(--no-primary-500);
          color: var(--no-neutral-0);
        }

        .ly-feature-card--gray {
          background-color: var(--no-neutral-300);
          color: var(--no-neutral-800);
        }

        .ly-feature-card--reverse {
          flex-direction: row-reverse;
        }

        .ly-feature-card__image {
          flex: 1;
          overflow: hidden;
          aspect-ratio: 4 / 3;
        }

        .ly-feature-card__image img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .ly-feature-card__image--right img {
          border-radius: 0 10px 10px 0;
        }

        .ly-feature-card__image--left img {
          border-radius: 10px 0 0 10px;
        }

        .ly-feature-card__content {
          flex: 1;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 0 4rem;
        }

        .ly-feature-card__title {
          font-size: var(--fo-36);
          font-weight: 700;
          margin: 0;
          padding-right: 4rem;
        }

        .ly-feature-card__text {
          margin: 20px 0;
          font-size: 16px;
          padding-right: 4rem;
        }

        @media (max-width: 768px) {
          .ly-feature-card {
            flex-direction: column;
          }

          .ly-feature-card__image {
            height: 260px;
            aspect-ratio: unset;
          }

          .ly-feature-card__image img {
            border-radius: 20px 20px 0 0;
          }

          .ly-feature-card__content {
            padding: 24px;
          }

          .ly-feature-card__title,
          .ly-feature-card__text {
            padding-right: 0;
          }
        }
      </style>
      <a href="#" class="ly-feature-card-link">
        <section class="ly-feature-card">
          <!-- BILDE Bytt kun src (bildelenke) og endre teksten i alt-attributtet -->
          <div class="ly-feature-card__image ly-feature-card__image--right">
            <img
              src="https://placehold.co/600x400"
              alt="Beskrivende tekst for bildet" />
          </div>

          <!-- TEKSTINNHOLD Endre overskrift og tekst fritt innenfor h2 og p -->
          <div class="ly-feature-card__content">
            <h2 class="ly-feature-card__title">
              Enkel og effektiv rengjøring etter festen - Alt du trenger på ett
              sted
            </h2>

            <p class="ly-feature-card__text">
              Når festen er over og gjestene har dratt, begynner jobben med å
              rydde opp. Med riktig utstyr blir rengjøringen både enklere og mer
              effektiv.
            </p>

            <!-- CTA-KNAPP Endre kun teksten (lenken styres av hele kortet) -->
            <div
              class="no-pill-btn no-pill-btn-brand-primary"
              style="margin-top: 24px; margin-left: 0.9rem; font-size: 20px">
              Se produktene her
            </div>
          </div>
        </section>
      </a>
      <!-- endregion -->
    </section>
  </body>
</html>
