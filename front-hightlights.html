<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LY-highlights-front</title>
    <link rel="stylesheet" href="/style.css" />
    <base href="http://cdn-netshop.lyrecocontract.no/" />
  </head>
  <body>
    <section class="main_wrapper_body">
      <style>
        .main_wrapper_body {
          max-width: 1440px;
          width: 100%;
          display: flex;
          flex-direction: column;
          row-gap: 48px;
          font-family: "Jost", sans-serif;
          font-size: var(--fo-16);
          margin-left: auto;
          margin-right: auto;
        }

        @media (max-width: 768px) {
          .main_wrapper_body {
            padding: 0 10px;
          }
        }
      </style>
      <!-- LY-highlights-front -->
      <section class="ly-highlights-front">
        <style>
          .ly-highlights-front {
            position: relative;
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
          }

          .ly-highlights-front__track {
            display: flex;
            justify-content: flex-start;
            align-items: stretch;
            gap: 12px;
            overflow-x: auto;
            overflow-y: hidden;
            height: 240px;
            padding-bottom: 8px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
          }

          .ly-highlights-front__track::-webkit-scrollbar {
            display: none;
          }

          .ly-highlights-front__card {
            display: flex;
            width: 380px;
            min-width: 380px;
            height: 220px;
            flex: 0 0 380px;
            border-radius: 10px;
            text-decoration: none !important;
            color: inherit;
            transition: transform 0.3s ease;
            overflow: hidden;
            scroll-snap-align: start;
          }

          .ly-highlights-front__card:hover {
            transform: translateY(-10px);
          }

          .ly-highlights-front__text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px 12px 32px 24px;
          }

          .ly-highlights-front__text h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 700;
          }

          .ly-highlights-front__text p {
            margin: 0;
            font-size: 14px;
            line-height: 1.4;
          }

          .ly-highlights-front__image {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
          }

          .ly-highlights-front__image img {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            right: 0;
            bottom: -10px;
          }

          /* Color variants */
          .ly-highlights-front__card--red {
            background-color: var(--no-semantic-error-400, #fdd9d9);
          }

          .ly-highlights-front__card--yellow {
            background-color: var(--no-semantic-warning-400, #ffefc8);
          }

          .ly-highlights-front__card--primary {
            background-color: var(--no-primary-200, #e0e1f5);
          }

          .ly-highlights-front__card--mint {
            background-color: var(--no-supporting-mint-300, #dbedde);
          }

          .ly-highlights-front__card--cerulean {
            background-color: var(--no-supporting-cerulean-300, #bfe8ff);
          }

          @media (hover: none) {
            .ly-highlights-front__card:hover {
              transform: none;
            }
          }
        </style>

        <div class="ly-highlights-front__track">
          <!-- CARD 1 -->
          <a
            class="ly-highlights-front__card ly-highlights-front__card--red"
            href="#"
            style="text-decoration: none !important"
          >
            <span class="ly-highlights-front__text">
              <h2>Tittel</h2>
              <p>Kort beskrivelse<br />på to linjer</p>
            </span>
            <span class="ly-highlights-front__image">
              <img src="https://placehold.co/180x200" alt="Produktbilde" />
            </span>
          </a>

          <!-- CARD 2 -->
          <a
            class="ly-highlights-front__card ly-highlights-front__card--yellow"
            href="#"
            style="text-decoration: none !important"
          >
            <span class="ly-highlights-front__text">
              <h2>Tittel</h2>
              <p>Kort beskrivelse<br />på to linjer</p>
            </span>
            <span class="ly-highlights-front__image">
              <img src="https://placehold.co/180x200" alt="Produktbilde" />
            </span>
          </a>

          <!-- CARD 3 -->
          <a
            class="ly-highlights-front__card ly-highlights-front__card--primary"
            href="#"
            style="text-decoration: none !important"
          >
            <span class="ly-highlights-front__text">
              <h2>Tittel</h2>
              <p>Kort beskrivelse<br />på to linjer</p>
            </span>
            <span class="ly-highlights-front__image">
              <img src="https://placehold.co/180x200" alt="Produktbilde" />
            </span>
          </a>
        </div>
      </section>
    </section>
  </body>
</html>
