<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LY-nav-top</title>
    <link rel="stylesheet" href="/style.css" />
    <base href="http://cdn-netshop.lyrecocontract.no/" />
  </head>
  <body>
    <section class="main_wrapper_body">
      <style>
        .main_wrapper_body {
          max-width: 1440px;
          width: 100%;
          display: flex;
          flex-direction: column;
          row-gap: 48px;
          font-family: "Jost", sans-serif;
          font-size: var(--fo-16);
          margin-left: auto;
          margin-right: auto;
        }

        @media (max-width: 768px) {
          .main_wrapper_body {
            padding: 0 10px;
          }
        }
      </style>

      <!-- LY-nav-top -->
      <nav class="ly-nav-top">
        <style>
          .ly-nav-top {
            width: 100%;
            max-width: 1440px;
            background-color: var(--no-neutral-0, #fff);
            border-bottom: 1px solid var(--no-primary-300, #b3b3e5);
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            scroll-behavior: smooth;
            font-size: 1.2rem;
            text-align: center;
          }

          .ly-nav-top::-webkit-scrollbar {
            display: none;
          }

          .ly-nav-top__list {
            display: inline-flex;
            list-style: none;
            padding: 0;
            margin: 0;
            gap: 0;
            white-space: nowrap;
          }

          .ly-nav-top__list > li {
            flex: 0 0 auto;
          }

          .ly-nav-top__list a {
            display: block;
            padding: 0.5rem 1rem;
            position: relative;
            text-decoration: none !important;
            color: var(--no-primary-500, #2d2e87);
            cursor: pointer;
            white-space: nowrap;
          }

          .ly-nav-top__list a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background: var(--no-primary-500, #2d2e87);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
          }

          .ly-nav-top__list a:hover::after,
          .ly-nav-top__active a::after {
            transform: scaleX(1);
          }
        </style>

        <ul class="ly-nav-top__list">
          <li><a href="#">Lenke 1</a></li>
          <li><a href="#">Lenke 2</a></li>
          <li><a href="#">Lenke 3</a></li>
          <li class="ly-nav-top__active"><a href="#">Aktiv lenke</a></li>
          <li><a href="#">Lenke 5</a></li>
        </ul>
      </nav>
    </section>
  </body>
</html>
