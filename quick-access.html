<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LY-menu-quick-access</title>
    <link rel="stylesheet" href="/style.css" />
    <base href="http://cdn-netshop.lyrecocontract.no/" />
  </head>
  <body>
    <section class="main_wrapper_body">
      <style>
        .main_wrapper_body {
          max-width: 1440px;
          width: 100%;
          display: flex;
          flex-direction: column;
          row-gap: 48px;
          font-family: "Jost", sans-serif;
          font-size: var(--fo-16);
          margin-left: auto;
          margin-right: auto;
        }

        @media (max-width: 768px) {
          .main_wrapper_body {
            padding: 0 10px;
          }
        }
      </style>

      <!-- LY-menu-quick-access -->
      <section class="ly-menu-quick-access">
        <style>
          .ly-menu-quick-access {
            max-width: 1440px;
            width: 100%;
            position: relative;
            margin: 0 auto;
          }

          .ly-menu-quick-access__list {
            width: 100%;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
          }

          .ly-menu-quick-access__list::-webkit-scrollbar {
            display: none;
          }

          .ly-menu-quick-access__link {
            text-decoration: none !important;
            flex: 1;
          }

          .ly-menu-quick-access__btn {
            height: 48px;
            min-width: 120px;
            border: 1px solid var(--no-primary-500, #2d2e87);
            background-color: var(--no-neutral-0, #ffffff);
            padding: 0 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            margin: 0;
            color: var(--no-primary-500, #2d2e87);
            border-radius: 10px;
            transition:
              background-color 0.3s ease,
              color 0.3s ease;
          }

          .ly-menu-quick-access__btn:hover {
            background-color: var(--no-primary-500, #2d2e87);
            color: var(--no-neutral-0, #ffffff);
          }

          @media (max-width: 768px) {
            .ly-menu-quick-access__link {
              flex: 0 0 auto;
            }
          }
        </style>

        <div class="ly-menu-quick-access__list">
          <!-- BUTTON 1 -->
          <a class="ly-menu-quick-access__link" href="#">
            <div class="ly-menu-quick-access__btn">Kategori</div>
          </a>

          <!-- BUTTON 2 -->
          <a class="ly-menu-quick-access__link" href="#">
            <div class="ly-menu-quick-access__btn">Kategori</div>
          </a>

          <!-- BUTTON 3 -->
          <a class="ly-menu-quick-access__link" href="#">
            <div class="ly-menu-quick-access__btn">Kategori</div>
          </a>

          <!-- BUTTON 4 -->
          <a class="ly-menu-quick-access__link" href="#">
            <div class="ly-menu-quick-access__btn">Kategori</div>
          </a>
        </div>
      </section>
    </section>
  </body>
</html>
